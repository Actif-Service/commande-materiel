<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commande Matériel — Actif Service</title>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1B5FA8;--blue-2:#2272C3;--blue-light:#EBF3FC;--blue-dark:#0D3D70;
  --green:#1E7C4A;--green-light:#E8F7EE;--green-2:#25A660;
  --amber:#B86A0A;--amber-light:#FEF3E2;
  --red:#B91C1C;--red-light:#FEE2E2;
  --slate:#64748B;--slate-light:#F8FAFC;--border:#E2E8F0;
  --text:#0F172A;--text-2:#475569;--white:#FFFFFF;
  --r:12px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',system-ui,sans-serif;background:#F1F5F9;color:var(--text);min-height:100vh;}
img{display:block;}
.nav{background:var(--white);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;padding:0 24px;gap:8px;position:sticky;top:0;z-index:200;box-shadow:0 1px 0 var(--border);}
.nav-brand{display:flex;align-items:center;gap:10px;margin-right:auto;}
.nav-logo-img{height:32px;border-radius:6px;object-fit:contain;}
.nav-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--blue-dark);letter-spacing:-.3px;}
.nav-pill{display:flex;background:#F1F5F9;border-radius:8px;padding:3px;gap:2px;}
.ntab{padding:6px 14px;border-radius:6px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--slate);cursor:pointer;transition:.15s;white-space:nowrap;}
.ntab.on{background:var(--white);color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.1);font-weight:600;}
.ntab:hover:not(.on){color:var(--text);}
.nav-badge{background:var(--red);color:#fff;border-radius:20px;font-size:10px;font-weight:700;padding:1px 6px;min-width:18px;text-align:center;display:none;}
.nav-badge.show{display:inline-block;}
.page{display:none;padding:28px 24px;max-width:980px;margin:0 auto;}
.page.on{display:block;}
.pg-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;}
.pg-sub{font-size:14px;color:var(--text-2);margin-bottom:24px;}
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--slate);margin-bottom:12px;}
.frow{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:14px;}
.fgroup{display:flex;flex-direction:column;gap:5px;}
.flabel{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--slate);}
input[type=text],input[type=email],input[type=password],select,textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--white);outline:none;transition:.15s;}
input:focus,select:focus,textarea:focus{border-color:var(--blue-2);box-shadow:0 0 0 3px rgba(34,114,195,.1);}
textarea{resize:vertical;min-height:80px;}
.btn{padding:10px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover:not(:disabled){background:var(--blue-2);}
.btn-success{background:var(--green);color:#fff;}
.btn-success:hover:not(:disabled){background:var(--green-2);}
.btn-ghost{background:#F1F5F9;color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--border);}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid rgba(185,28,28,.15);}
.btn-danger:hover{background:#FCA5A5;color:var(--red);}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px;}

/* ══════════════════════════════════════
   GRILLE PRODUITS — STABLE (fix principal)
   ══════════════════════════════════════ */
.prod-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:10px;
  margin:16px 0;
  align-items:start; /* évite l'étirement vertical */
}
.prod-card{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  transition:border-color .15s,box-shadow .15s;
  display:flex;
  flex-direction:column;
}
.prod-card:hover{border-color:var(--blue-2);box-shadow:0 4px 12px rgba(27,95,168,.12);}
.prod-card.has-qty{border-color:var(--blue);background:var(--blue-light);}

/* Conteneur image à hauteur FIXE — empêche le saut de layout */
.prod-img-wrap{
  width:100%;
  height:90px;
  flex-shrink:0;
  background:#EEF2F7;
  position:relative;
  overflow:hidden;
}
/* Icône placeholder visible avant chargement */
.prod-img-wrap::after{
  content:'📦';
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  opacity:.2;
  pointer-events:none;
}
.prod-img{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  top:0;left:0;
  opacity:0;
  transition:opacity .25s;
}
.prod-img.loaded{opacity:1;}

/* Nom à hauteur fixe — cartes toutes identiques */
.prod-name{
  font-size:11px;
  font-weight:500;
  padding:7px 8px 4px;
  line-height:1.35;
  height:40px;
  overflow:hidden;
  color:var(--text);
  flex-shrink:0;
}
.qty-row{display:flex;align-items:center;justify-content:center;gap:5px;padding:5px 8px 9px;flex-shrink:0;}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:var(--white);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--text);transition:.1s;line-height:1;}
.qty-btn:hover{background:var(--blue-light);border-color:var(--blue-2);color:var(--blue);}
.prod-card.has-qty .qty-btn{border-color:var(--blue-2);}
.qty-inp{width:36px;text-align:center;border:1.5px solid var(--border);border-radius:6px;font-size:14px;font-weight:700;padding:3px 0;color:var(--text);background:transparent;outline:none;}
.qty-inp:focus{border-color:var(--blue-2);}

.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;gap:4px;}
.badge-blue{background:var(--blue-light);color:var(--blue);}
.badge-green{background:var(--green-light);color:var(--green);}
.badge-slate{background:#F1F5F9;color:var(--slate);}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.pill-wait{background:var(--amber-light);color:var(--amber);}
.pill-part{background:var(--blue-light);color:var(--blue);}
.pill-done{background:var(--green-light);color:var(--green);}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.stat-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px;text-align:center;box-shadow:var(--shadow);}
.stat-num{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;line-height:1;}
.stat-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--slate);margin-top:4px;}
.filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.fbtn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--slate);transition:.15s;}
.fbtn.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.fbtn:hover:not(.on){border-color:var(--blue-2);color:var(--blue);}
.cmd-row{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);}
.cmd-row.done{border-color:#86EFAC;background:#F0FDF4;}
.cmd-row.part{border-color:#93C5FD;background:#EFF6FF;}
.cmd-head{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.cmd-head:hover{background:rgba(0,0,0,.02);}
.cmd-info{flex:1;min-width:0;}
.cmd-ttl{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cmd-meta{font-size:12px;color:var(--slate);margin-top:2px;}
.cmd-body{display:none;border-top:1px solid var(--border);}
.cmd-body.open{display:block;}
.suivi-table{width:100%;border-collapse:collapse;font-size:13px;}
.suivi-table th{background:#F8FAFC;padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.4px;}
.suivi-table td{padding:9px 12px;border-top:1px solid var(--border);vertical-align:middle;}
.chk-lbl{display:flex;align-items:center;gap:7px;cursor:pointer;}
.chk-lbl input[type=checkbox]{width:17px;height:17px;accent-color:var(--green);cursor:pointer;}
.chk-lbl.done{color:var(--green);}
.chk-lbl.done .lbl-txt{text-decoration:line-through;opacity:.6;}
.qty-pill{display:inline-block;background:var(--blue-light);color:var(--blue);font-weight:700;font-size:13px;padding:2px 10px;border-radius:20px;min-width:32px;text-align:center;}
.client-list{display:flex;flex-direction:column;gap:8px;}
.client-item{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s;box-shadow:var(--shadow);}
.client-item:hover{border-color:var(--blue-2);background:var(--blue-light);}
.client-name{font-size:14px;font-weight:600;}
.client-meta{font-size:12px;color:var(--slate);margin-top:2px;}
.chantier-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.chantier-card{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:.15s;box-shadow:var(--shadow);}
.chantier-card:hover{border-color:var(--blue-2);background:var(--blue-light);}
.chantier-name{font-size:14px;font-weight:600;margin-bottom:6px;}
.chantier-addr{font-size:11px;color:var(--slate);margin-bottom:10px;line-height:1.4;}
.prod-check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.pci{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:.15s;background:var(--white);}
.pci:hover{border-color:var(--blue-2);}
.pci.on{border-color:var(--green);background:var(--green-light);}
.pci input[type=checkbox]{accent-color:var(--green);width:16px;height:16px;cursor:pointer;flex-shrink:0;}
.pci-lbl{font-size:12px;font-weight:500;line-height:1.3;cursor:pointer;}
.pci.on .pci-lbl{color:var(--green);}
.bc{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--slate);margin-bottom:20px;flex-wrap:wrap;}
.bc a{color:var(--blue);cursor:pointer;font-weight:500;}
.bc a:hover{text-decoration:underline;}
.bc-sep{color:var(--border);}
.link-box{background:var(--blue-light);border:1px solid rgba(27,95,168,.2);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.link-url{font-size:12px;font-weight:500;color:var(--blue);flex:1;word-break:break-all;}
.alert{padding:13px 16px;border-radius:9px;font-size:13px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;}
.alert-info{background:var(--blue-light);color:var(--blue);border:1px solid rgba(27,95,168,.2);}
.alert-warn{background:var(--amber-light);color:var(--amber);border:1px solid rgba(184,106,10,.2);}
.cart-bar{position:sticky;bottom:16px;left:0;right:0;z-index:100;display:none;}
.cart-bar.show{display:block;}
.cart-inner{max-width:980px;margin:0 auto;padding:0 24px;}
.cart-pill{background:var(--blue-dark);color:#fff;border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(13,61,112,.35);cursor:pointer;transition:.2s;}
.cart-pill:hover{background:var(--blue);}
.cart-count{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}
.cart-desc{font-size:13px;opacity:.85;flex:1;}
.cart-send{background:#fff;color:var(--blue-dark);padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;border:none;cursor:pointer;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#fff;padding:13px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:9999;opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none;max-width:360px;box-shadow:0 8px 24px rgba(0,0,0,.25);}
.toast.show{opacity:1;transform:none;}
.toast.err{background:var(--red);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:var(--white);border-radius:16px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.3);}
.modal-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:20px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;flex-wrap:wrap;}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.spacer{flex:1;}
.order-hero{background:linear-gradient(135deg,var(--blue-dark),var(--blue-2));border-radius:14px;padding:24px;margin-bottom:24px;color:#fff;display:flex;align-items:center;gap:16px;}
.order-hero-logo{height:52px;border-radius:10px;object-fit:contain;background:rgba(255,255,255,.15);padding:4px;}
.order-hero-text h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.order-hero-text p{font-size:13px;opacity:.8;margin-top:3px;}
.search-wrap{position:relative;margin-bottom:14px;}
.search-wrap input{padding-left:36px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--slate);font-size:15px;pointer-events:none;}
.admin-tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--border);}
.atab{padding:10px 16px;font-size:13px;font-weight:600;color:var(--slate);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;}
.atab.on{color:var(--blue);border-bottom-color:var(--blue);}
.empty{text-align:center;padding:48px 16px;color:var(--slate);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-title{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--text);}
.empty-sub{font-size:13px;}
.inline-form{background:#F8FAFC;border:1.5px dashed var(--border);border-radius:10px;padding:16px;margin-top:12px;}
@media(max-width:640px){
  .nav{padding:0 14px;}
  .page{padding:20px 14px;}
  .stats-grid{grid-template-columns:repeat(3,1fr);gap:8px;}
  .stat-num{font-size:24px;}
  .prod-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;}
  .frow{grid-template-columns:1fr;}
  .order-hero{flex-direction:column;text-align:center;}
  .ntab{padding:5px 10px;font-size:12px;}
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="modal-confirm">
  <div class="modal">
    <div class="modal-title">📦 Confirmer la commande</div>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-success" id="modal-send-btn" onclick="doSendCmd()">✓ Envoyer</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-login">
  <div class="modal" style="max-width:380px;">
    <div class="modal-title">🔐 Espace Administration</div>
    <div class="fgroup" style="margin-bottom:16px;">
      <label class="flabel">Mot de passe</label>
      <input type="password" id="admin-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkAdminPw()">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="checkAdminPw()">Accéder</button>
    </div>
  </div>
</div>

<nav class="nav" id="main-nav" style="display:none;">
  <div class="nav-brand">
    <img class="nav-logo-img" src="https://actif-service.github.io/Commande-Produits/images/logo.jpg" alt="Actif Service" onerror="this.style.display='none'">
    <span class="nav-title">Actif Service</span>
  </div>
  <div class="nav-pill">
    <button class="ntab on" id="tab-order" onclick="goTab('order')">Commande</button>
    <button class="ntab" id="tab-suivi" onclick="goTab('suivi')">
      Livraisons <span class="nav-badge" id="badge-suivi"></span>
    </button>
    <button class="ntab" id="tab-admin" onclick="goTabAdmin()">Admin</button>
  </div>
</nav>

<div class="page on" id="pg-order"></div>
<div class="page" id="pg-suivi"></div>
<div class="page" id="pg-admin"></div>

<div class="cart-bar" id="cart-bar">
  <div class="cart-inner">
    <div class="cart-pill" onclick="openConfirm()">
      <span class="cart-count" id="cart-count">0</span>
      <span class="cart-desc" id="cart-desc">produits sélectionnés</span>
      <button class="cart-send">Envoyer →</button>
    </div>
  </div>
</div>

const LS={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}},
  del:(k)=>{localStorage.removeItem(k);}
};
function getClients(){return LS.get('as_clients',DEFAULT_CLIENTS);}
function saveClients(c){LS.set('as_clients',c);}
function getCommandes(){return LS.get('as_commandes',[]);}
function saveCommandes(c){LS.set('as_commandes',c);}
function getChantierProds(ck,cn){return LS.get('acp_'+ck+'_'+encodeURIComponent(cn),null);}
function setChantierProds(ck,cn,v){LS.set('acp_'+ck+'_'+encodeURIComponent(cn),v);}
function delChantierProds(ck,cn){LS.del('acp_'+ck+'_'+encodeURIComponent(cn));}
function isAdminUnlocked(){return sessionStorage.getItem('as_admin')==='1';}
function unlockAdmin(){sessionStorage.setItem('as_admin','1');}

const esc=s=>s?String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]):'';
const fmtDate=iso=>{const d=new Date(iso);return d.toLocaleDateString('fr-BE')+' '+d.toLocaleTimeString('fr-BE',{hour:'2-digit',minute:'2-digit'});};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);

function showToast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(err?' err':'');
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',3800);
}

function onChantierChange(){
  const v=document.getElementById('ord-chantier').value;
  const hint=document.getElementById('ord-hint');
  const prods=document.getElementById('ord-prods');
  const autreWrap=document.getElementById('ord-autre-wrap');
  if(!v){hint.style.display='';prods.style.display='none';autreWrap.style.display='none';return;}
  hint.style.display='none';prods.style.display='';autreWrap.style.display='';
  ORDER.chantier=v;ORDER.produits={};
  const allowed=getChantierProds(ORDER.client.key,v);
  const list=allowed?ALL_PRODUCTS.filter(p=>allowed.includes(p.nom)):ALL_PRODUCTS;
  document.getElementById('ord-pcnt').textContent=list.length+' produit'+(list.length>1?'s':'');
  renderProdGrid(list);
  updateCartBar();
}

// ✅ FIX : conteneur image à hauteur fixe, image en position absolute, fade-in au chargement
function renderProdGrid(list){
  document.getElementById('ord-grid').innerHTML=list.map(p=>{
    const e=encodeURIComponent(p.nom);
    return `<div class="prod-card" id="pc_${e}">
      <div class="prod-img-wrap">
        <img class="prod-img" src="${esc(p.img)}" alt="${esc(p.nom)}"
          onload="this.classList.add('loaded')"
          onerror="this.style.display='none'">
      </div>
      <div class="prod-name">${esc(p.nom)}</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="dq('${e}',-1)">−</button>
        <input class="qty-inp" type="number" id="q_${e}" value="0" min="0" data-nom="${esc(p.nom)}" onchange="onQtyChange('${e}')">
        <button class="qty-btn" onclick="dq('${e}',1)">+</button>
      </div>
    </div>`;
  }).join('');
}

function filterProds(q){
  const grid=document.getElementById('ord-grid');if(!grid)return;
  const q2=q.toLowerCase();
  grid.querySelectorAll('.prod-card').forEach(card=>{
    card.style.display=card.querySelector('.prod-name').textContent.toLowerCase().includes(q2)?'':'none';
  });
}
function dq(e,d){
  const i=document.getElementById('q_'+e);if(!i)return;
  i.value=Math.max(0,(parseInt(i.value)||0)+d);onQtyChange(e);
}
function onQtyChange(e){
  const i=document.getElementById('q_'+e);
  const card=document.getElementById('pc_'+e);
  const q=parseInt(i.value)||0;
  const nom=i.dataset.nom;
  if(q>0){ORDER.produits[nom]=q;card.classList.add('has-qty');}
  else{delete ORDER.produits[nom];card.classList.remove('has-qty');}
  updateCartBar();
}
function resetQtys(){
  document.querySelectorAll('.qty-inp').forEach(i=>{i.value=0;});
  document.querySelectorAll('.prod-card').forEach(c=>c.classList.remove('has-qty'));
  ORDER.produits={};updateCartBar();
}
function updateCartBar(){
  const total=Object.values(ORDER.produits).reduce((s,v)=>s+v,0);
  const items=Object.keys(ORDER.produits).length;
  document.getElementById('cart-count').textContent=total;
  document.getElementById('cart-desc').textContent=items===1?'produit sélectionné':items+' produits, '+total+' unités';
  document.getElementById('cart-bar').classList.toggle('show',items>0&&!!ORDER.chantier);
}

function doSendCmd(){
  const{_pendingChantier:chantier,_pendingNom:nom,_pendingAutre:autre,_pendingChD:chD}=ORDER;
  const btn=document.getElementById('modal-send-btn');
  btn.disabled=true;btn.textContent='Envoi...';
  const now=new Date();
  const date=now.toLocaleDateString('fr-BE');
  const heure=now.toLocaleTimeString('fr-BE',{hour:'2-digit',minute:'2-digit'});
  const lignes=Object.entries(ORDER.produits).map(([n,qty])=>({nom:n,qty,livre:false}));
  const htmlEmail=buildEmailHtml(ORDER.client.societe,chantier,chD,nom,date,heure,lignes,autre);
  Promise.allSettled(
    CFG.destinataires.map(to=>emailjs.send(CFG.emailjsService,CFG.emailjsTemplate,{
      societe:ORDER.client.societe,chantier,nom,commande:htmlEmail,to_email:to
    }))
  ).then(results=>{
    btn.disabled=false;btn.textContent='✓ Envoyer';
    closeModal();
    if(results.some(r=>r.status==='fulfilled')){
      const cmds=getCommandes();
      cmds.unshift({
        id:uid(),date:now.toISOString(),
        societe:ORDER.client.societe,clientKey:ORDER.client.key,
        chantier,adresse:chD?chD.adresse:'',
        demandeur:nom,autre:autre||'',
        lignes,statut:'attente'
      });
      saveCommandes(cmds);
      updateSuiviBadge();
      showToast('✓ Commande envoyée !');

      // ✅ FIX : réinitialisation SANS reconstruire la grille (pas de saut visuel)
      resetQtys();
      const nomEl=document.getElementById('ord-nom');
      const autreEl=document.getElementById('ord-autre');
      const chantierEl=document.getElementById('ord-chantier');
      if(nomEl)nomEl.value='';
      if(autreEl)autreEl.value='';
      if(chantierEl)chantierEl.value='';
      const hint=document.getElementById('ord-hint');
      const prods=document.getElementById('ord-prods');
      const autreWrap=document.getElementById('ord-autre-wrap');
      if(hint)hint.style.display='';
      if(prods)prods.style.display='none';
      if(autreWrap)autreWrap.style.display='none';
      ORDER.chantier=null;
      updateCartBar();
    }else{
      showToast("Erreur d'envoi. Vérifiez votre connexion.",true);
    }
  });
}

  });
  el.innerHTML=`
    <div class="pg-title">Suivi des livraisons</div>
    <div class="pg-sub">${cmds.length} commande${cmds.length!==1?'s':''} enregistrée${cmds.length!==1?'s':''}</div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-num" style="color:var(--amber);">${att}</div><div class="stat-lbl">En attente</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--blue);">${par}</div><div class="stat-lbl">En cours</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--green);">${liv}</div><div class="stat-lbl">Livrées</div></div>
    </div>
    <div class="filters">
      ${[['all','Toutes',cmds.length],['attente','En attente',att],['partielle','En cours',par],['livree','Livrées',liv]].map(([f,l,n])=>
        `<button class="fbtn${SF===f?' on':''}" onclick="setSF('${f}')">${l} <span style="opacity:.7">(${n})</span></button>`
      ).join('')}
      <div class="spacer"></div>
      ${liv>0?`<button class="btn btn-danger btn-sm" onclick="clearLiv()">🗑 Supprimer livrées</button>`:''}
    </div>
    <div class="search-wrap" style="margin-bottom:16px;">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Rechercher société, chantier, demandeur..." value="${esc(SUIVI_SEARCH)}" oninput="SUIVI_SEARCH=this.value;renderSuivi()">
    </div>
    ${filt.length===0
      ?`<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Aucune commande</div><div class="empty-sub">Pas de commande dans cette catégorie.</div></div>`
      :filt.map(c=>buildCmdRow(c)).join('')}`;
  updateSuiviBadge();
}
function buildCmdRow(c){
  const nl=c.lignes.length,ll=c.lignes.filter(l=>l.livre).length;
  let cls='',pill='';
  if(c.statut==='livree'){cls=' done';pill=`<span class="pill pill-done">✓ Livré</span>`;}
  else if(c.statut==='partielle'){cls=' part';pill=`<span class="pill pill-part">${ll}/${nl} livrés</span>`;}
  else pill=`<span class="pill pill-wait">En attente</span>`;
  return`<div class="cmd-row${cls}" id="row_${c.id}">
  <div class="cmd-head" onclick="togDet('${c.id}')">
    <div class="cmd-info">
      <div class="cmd-ttl">${esc(c.societe)} · ${esc(c.chantier)}</div>
      <div class="cmd-meta">${esc(c.demandeur)} · ${fmtDate(c.date)}</div>
    </div>
    <div id="pill_${c.id}">${pill}</div>
    <span style="color:var(--slate);margin-left:8px;font-size:18px;">›</span>
  </div>
  <div class="cmd-body" id="det_${c.id}">
    <table class="suivi-table">
      <thead><tr><th style="width:50%">Produit</th><th style="width:70px;text-align:center">Qté</th><th>Livraison</th></tr></thead>
      <tbody>
        ${c.lignes.map((l,i)=>`<tr>
          <td>${esc(l.nom)}</td>
          <td style="text-align:center"><span class="qty-pill">${l.qty}</span></td>
          <td><label class="chk-lbl${l.livre?' done':''}" id="cl_${c.id}_${i}">
            <input type="checkbox"${l.livre?' checked':''} onchange="togLiv('${c.id}',${i},this.checked)">
            <span class="lbl-txt">${l.livre?'Livré':'À livrer'}</span>
          </label></td>
        </tr>`).join('')}
        ${c.autre?`<tr><td colspan="3" style="color:var(--slate);font-style:italic;font-size:12px;padding:10px 12px;">📝 ${esc(c.autre)}</td></tr>`:''}
      </tbody>
    </table>
    <div style="display:flex;gap:8px;padding:12px 16px 16px;flex-wrap:wrap;">
      ${c.statut!=='livree'?`<button class="btn btn-success btn-sm" onclick="markAll('${c.id}')">✓ Tout livré</button>`:''}
      <button class="btn btn-danger btn-sm" onclick="delCmd('${c.id}')">Supprimer</button>
    </div>
  </div>
</div>`;
}
function togDet(id){document.getElementById('det_'+id).classList.toggle('open');}
function togLiv(id,idx,v){
  const cmds=getCommandes(),c=cmds.find(x=>x.id===id);if(!c)return;
  c.lignes[idx].livre=v;
  const lbl=document.getElementById('cl_'+id+'_'+idx);
  if(lbl){lbl.className='chk-lbl'+(v?' done':'');lbl.querySelector('.lbl-txt').textContent=v?'Livré':'À livrer';}
  const ll=c.lignes.filter(l=>l.livre).length;
  c.statut=ll===0?'attente':ll===c.lignes.length?'livree':'partielle';
  saveCommandes(cmds);updRowStyle(c,ll);updateSuiviBadge();
}
function updRowStyle(c,ll){
  const row=document.getElementById('row_'+c.id);if(!row)return;
  row.className='cmd-row'+(c.statut==='livree'?' done':c.statut==='partielle'?' part':'');
  const pill=document.getElementById('pill_'+c.id);if(!pill)return;
  if(c.statut==='livree')pill.innerHTML=`<span class="pill pill-done">✓ Livré</span>`;
  else if(c.statut==='partielle')pill.innerHTML=`<span class="pill pill-part">${ll}/${c.lignes.length} livrés</span>`;
  else pill.innerHTML=`<span class="pill pill-wait">En attente</span>`;
}
function markAll(id){
  const cmds=getCommandes(),c=cmds.find(x=>x.id===id);if(!c)return;
  c.lignes.forEach((l,i)=>{
    l.livre=true;
    const lbl=document.getElementById('cl_'+id+'_'+i);
    if(lbl){lbl.className='chk-lbl done';lbl.querySelector('.lbl-txt').textContent='Livré';lbl.querySelector('input').checked=true;}
  });
  c.statut='livree';saveCommandes(cmds);updRowStyle(c,c.lignes.length);showToast('✓ Commande livrée');updateSuiviBadge();
}
function delCmd(id){if(!confirm('Supprimer cette commande ?'))return;saveCommandes(getCommandes().filter(c=>c.id!==id));renderSuivi();}
function clearLiv(){if(!confirm('Supprimer toutes les commandes livrées ?'))return;saveCommandes(getCommandes().filter(c=>c.statut!=='livree'));renderSuivi();}
function setSF(f){SF=f;renderSuivi();}

let ADM={client:null,chantier:null,tab:'clients',selProds:new Set()};
function renderAdmin(){
  const el=document.getElementById('pg-admin');
  if(ADM.client&&ADM.chantier){renderAdminChantier();return;}
  if(ADM.client){renderAdminClient();return;}
  const clients=getClients();
  el.innerHTML=`
    <div class="pg-title">Administration</div>
    <div class="pg-sub">Gérez les clients, chantiers et produits autorisés</div>
    <div class="admin-tabs">
      <div class="atab${ADM.tab==='clients'?' on':''}" onclick="ADM.tab='clients';renderAdmin()">Clients & Chantiers</div>
      <div class="atab${ADM.tab==='produits'?' on':''}" onclick="ADM.tab='produits';renderAdmin()">Catalogue produits</div>
      <div class="atab${ADM.tab==='config'?' on':''}" onclick="ADM.tab='config';renderAdmin()">Configuration</div>
    </div>
    ${ADM.tab==='clients'?renderAdminClients(clients):''}
    ${ADM.tab==='produits'?renderAdminProduits():''}
    ${ADM.tab==='config'?renderAdminConfig():''}`;
}
function renderAdminClients(clients){
  return`
    <div class="toolbar">
      <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;">${clients.length} clients</div>
      <div class="spacer"></div>
      <button class="btn btn-primary btn-sm" onclick="showAddClient()">+ Nouveau client</button>
    </div>
    <div class="alert alert-info">📧 Commandes envoyées à : <strong>${CFG.destinataires.join('</strong> et <strong>')}</strong></div>
    <div id="add-client-form"></div>
    <div class="client-list">
      ${clients.map(c=>{
        const cfg=c.chantiers.filter(ch=>getChantierProds(c.key,ch.nom)!==null).length;
        return`<div class="client-item" onclick="ADM.client='${c.key}';ADM.chantier=null;renderAdmin()">
          <div style="flex:1;"><div class="client-name">${esc(c.societe)}</div>
          <div class="client-meta">${c.chantiers.length} chantier${c.chantiers.length>1?'s':''}${cfg>0?` · <span style="color:var(--green);">${cfg} configuré${cfg>1?'s':''}</span>`:''}</div></div>
          <span style="color:var(--slate);font-size:20px;">›</span>
        </div>`;
      }).join('')}
    </div>`;
}
function showAddClient(){
  document.getElementById('add-client-form').innerHTML=`
    <div class="inline-form">
      <div class="frow" style="margin-bottom:10px;">
        <div class="fgroup"><label class="flabel">Nom de la société</label><input type="text" id="nc-societe" placeholder="Ex: ACME Clean"></div>
        <div class="fgroup"><label class="flabel">Clé unique (sans espaces)</label><input type="text" id="nc-key" placeholder="Ex: ACME_Clean"></div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary btn-sm" onclick="doAddClient()">Créer</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('add-client-form').innerHTML=''">Annuler</button>
      </div>
    </div>`;
}
function doAddClient(){
  const societe=document.getElementById('nc-societe').value.trim();
  const key=document.getElementById('nc-key').value.trim().replace(/\s+/g,'_');
  if(!societe||!key){showToast('Remplissez tous les champs',true);return;}
  const clients=getClients();
  if(clients.find(c=>c.key===key)){showToast('Cette clé existe déjà',true);return;}
  clients.push({key,societe,chantiers:[{nom:'Chantier 1',adresse:''}]});
  saveClients(clients);showToast('✓ Client créé');renderAdmin();
}
function renderAdminClient(){
  const clients=getClients(),c=clients.find(x=>x.key===ADM.client);
  if(!c){ADM.client=null;renderAdmin();return;}
  const el=document.getElementById('pg-admin');
  const link=location.origin+location.pathname+'?client='+c.key;
  el.innerHTML=`
    <div class="bc"><a onclick="ADM.client=null;ADM.chantier=null;renderAdmin()">Admin</a><span class="bc-sep">›</span>${esc(c.societe)}</div>
    <div class="pg-title">${esc(c.societe)}</div>
    <div class="pg-sub">Gérez les chantiers et les produits autorisés</div>
    <div class="card">
      <div class="card-title">Lien de commande client</div>
      <div class="link-box">
        <span class="link-url">${esc(link)}</span>
        <button class="btn btn-ghost btn-sm" onclick="navigator.clipboard.writeText('${esc(link)}').then(()=>showToast('Lien copié !'))">Copier</button>
      </div>
    </div>
    <div class="toolbar">
      <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;">Chantiers</div>
      <div class="spacer"></div>
      <button class="btn btn-primary btn-sm" onclick="showAddChantier('${c.key}')">+ Chantier</button>
      <button class="btn btn-danger btn-sm" onclick="deleteClient('${c.key}')">Supprimer client</button>
    </div>
    <div id="add-chantier-form"></div>
    <div class="chantier-grid">
      ${c.chantiers.map(ch=>{
        const pr=getChantierProds(c.key,ch.nom),cnt=pr?pr.length:ALL_PRODUCTS.length;
        return`<div class="chantier-card" onclick="ADM.chantier='${encodeURIComponent(ch.nom)}';renderAdmin()">
          <div class="chantier-name">${esc(ch.nom)}</div>
          ${ch.adresse?`<div class="chantier-addr">${esc(ch.adresse)}</div>`:'<div style="height:4px;"></div>'}
          ${pr!==null?`<span class="badge badge-green">${cnt} produit${cnt>1?'s':''}</span>`:`<span class="badge badge-slate">Tous les produits</span>`}
          <div style="font-size:11px;color:var(--blue);margin-top:10px;font-weight:600;">Configurer →</div>
        </div>`;
      }).join('')}
    </div>`;
}
function showAddChantier(ck){
  document.getElementById('add-chantier-form').innerHTML=`
    <div class="inline-form">
      <div class="frow" style="margin-bottom:10px;">
        <div class="fgroup"><label class="flabel">Nom du chantier</label><input type="text" id="nch-nom" placeholder="Ex: AKROPOLIS"></div>
        <div class="fgroup"><label class="flabel">Adresse (optionnel)</label><input type="text" id="nch-addr" placeholder="Ex: Rue X, 1000 Bruxelles"></div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary btn-sm" onclick="doAddChantier('${ck}')">Ajouter</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('add-chantier-form').innerHTML=''">Annuler</button>
      </div>
    </div>`;
}
function doAddChantier(ck){
  const nom=document.getElementById('nch-nom').value.trim();
  const adresse=document.getElementById('nch-addr').value.trim();
  if(!nom){showToast('Nom requis',true);return;}
  const clients=getClients(),c=clients.find(x=>x.key===ck);if(!c)return;
  c.chantiers.push({nom,adresse});saveClients(clients);showToast('✓ Chantier ajouté');renderAdmin();
}
function deleteClient(ck){
  if(!confirm('Supprimer ce client et tous ses chantiers ?'))return;
  saveClients(getClients().filter(c=>c.key!==ck));
  ADM.client=null;ADM.chantier=null;showToast('Client supprimé');renderAdmin();
}
function renderAdminChantier(){
  const clients=getClients(),c=clients.find(x=>x.key===ADM.client);
  const chNom=decodeURIComponent(ADM.chantier);
  const chD=c?c.chantiers.find(x=>x.nom===chNom):null;
  if(!c||!chD){ADM.chantier=null;renderAdmin();return;}
  const cur=getChantierProds(ADM.client,chNom);
  ADM.selProds=new Set(cur||ALL_PRODUCTS.map(p=>p.nom));
  const el=document.getElementById('pg-admin');
  el.innerHTML=`
    <div class="bc">
      <a onclick="ADM.client=null;ADM.chantier=null;renderAdmin()">Admin</a>
      <span class="bc-sep">›</span>
      <a onclick="ADM.chantier=null;renderAdmin()">${esc(c.societe)}</a>
      <span class="bc-sep">›</span>${esc(chNom)}
    </div>
    <div class="pg-title">${esc(chNom)}</div>
    <div class="pg-sub">${chD.adresse?esc(chD.adresse)+' · ':''}Sélectionnez les produits autorisés pour ce chantier</div>
    <div class="toolbar">
      <button class="btn btn-ghost btn-sm" onclick="selAllP(true)">Tout sélectionner</button>
      <button class="btn btn-ghost btn-sm" onclick="selAllP(false)">Tout désélectionner</button>
      <div class="spacer"></div>
      <span class="badge badge-blue" id="psel-cnt" style="font-size:13px;padding:5px 12px;">${ADM.selProds.size} / ${ALL_PRODUCTS.length}</span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Filtrer les produits..." oninput="filterProdAdmin(this.value)">
    </div>
    <div class="prod-check-grid" id="prod-check-grid">
      ${ALL_PRODUCTS.map(p=>{
        const e=encodeURIComponent(p.nom),on=ADM.selProds.has(p.nom);
        return`<div class="pci${on?' on':''}" id="pci_${e}" onclick="togP('${e}')">
          <input type="checkbox"${on?' checked':''} id="chk_${e}" onclick="event.stopPropagation();togP('${e}')">
          <label class="pci-lbl" for="chk_${e}" onclick="event.preventDefault()">${esc(p.nom)}</label>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="saveProdsConfig()">Enregistrer</button>
      <button class="btn btn-ghost" onclick="ADM.chantier=null;renderAdmin()">Annuler</button>
      ${cur!==null?`<button class="btn btn-danger btn-sm" style="margin-left:auto;" onclick="resetProdsConfig()">Réinitialiser (tous)</button>`:''}
    </div>`;
}
function filterProdAdmin(q){
  const q2=q.toLowerCase();
  document.querySelectorAll('.pci').forEach(el=>{
    el.style.display=el.querySelector('.pci-lbl').textContent.toLowerCase().includes(q2)?'':'none';
  });
}
function togP(e){
  const n=decodeURIComponent(e);
  const item=document.getElementById('pci_'+e),chk=document.getElementById('chk_'+e);
  if(ADM.selProds.has(n)){ADM.selProds.delete(n);item.classList.remove('on');chk.checked=false;}
  else{ADM.selProds.add(n);item.classList.add('on');chk.checked=true;}
  document.getElementById('psel-cnt').textContent=ADM.selProds.size+' / '+ALL_PRODUCTS.length;
}
function selAllP(v){
  ALL_PRODUCTS.forEach(p=>{
    const e=encodeURIComponent(p.nom),item=document.getElementById('pci_'+e),chk=document.getElementById('chk_'+e);
    if(v){ADM.selProds.add(p.nom);item.classList.add('on');chk.checked=true;}
    else{ADM.selProds.delete(p.nom);item.classList.remove('on');chk.checked=false;}
  });
  document.getElementById('psel-cnt').textContent=ADM.selProds.size+' / '+ALL_PRODUCTS.length;
}
function saveProdsConfig(){
  const chNom=decodeURIComponent(ADM.chantier);
  setChantierProds(ADM.client,chNom,ALL_PRODUCTS.filter(p=>ADM.selProds.has(p.nom)).map(p=>p.nom));
  showToast('✓ Configuration enregistrée');
  setTimeout(()=>{ADM.chantier=null;renderAdmin();},600);
}
function resetProdsConfig(){
  delChantierProds(ADM.client,decodeURIComponent(ADM.chantier));
  showToast('Réinitialisé — tous les produits visibles');
  setTimeout(()=>{ADM.chantier=null;renderAdmin();},600);
}
function renderAdminProduits(){
  return`
    <div class="alert alert-warn">⚠️ Le catalogue produits est défini dans le code source. Contactez votre développeur pour modifier la liste.</div>
    <div class="prod-check-grid">
      ${ALL_PRODUCTS.map(p=>`<div class="pci on" style="cursor:default;"><span style="font-size:16px;">📦</span><span class="pci-lbl">${esc(p.nom)}</span></div>`).join('')}
    </div>`;
}
function renderAdminConfig(){
  return`
    <div class="card">
      <div class="card-title">Destinataires email</div>
      <p style="font-size:13px;color:var(--slate);margin-bottom:12px;">Les commandes sont envoyées aux adresses suivantes :</p>
      ${CFG.destinataires.map(e=>`<div style="background:var(--blue-light);border-radius:7px;padding:9px 13px;font-size:13px;font-weight:500;color:var(--blue);margin-bottom:8px;">📧 ${esc(e)}</div>`).join('')}
      <p style="font-size:12px;color:var(--slate);margin-top:8px;">Pour modifier, éditez la variable <code>CFG.destinataires</code> dans le code source.</p>
    </div>
    <div class="card">
      <div class="card-title">Données & Stockage</div>
      <p style="font-size:13px;color:var(--slate);margin-bottom:14px;">Les données sont stockées localement dans le navigateur (localStorage).</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-ghost btn-sm" onclick="exportData()">⬇ Exporter les données</button>
        <button class="btn btn-danger btn-sm" onclick="clearAllData()">🗑 Tout effacer</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Réinitialiser clients</div>
      <p style="font-size:13px;color:var(--slate);margin-bottom:14px;">Restaurer la liste des clients d'origine.</p>
      <button class="btn btn-ghost btn-sm" onclick="resetClients()">↩ Réinitialiser la liste clients</button>
    </div>`;
}
function exportData(){
  const data={commandes:getCommandes(),clients:getClients(),exportDate:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='actif-service-data-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  showToast('✓ Données exportées');
}
function clearAllData(){
  if(!confirm('Effacer toutes les commandes et configurations ? Cette action est irréversible.'))return;
  localStorage.clear();showToast('Données effacées');renderAdmin();
}
function resetClients(){
  if(!confirm("Restaurer la liste d'origine ?"))return;
  saveClients(DEFAULT_CLIENTS);showToast('✓ Clients réinitialisés');
  ADM.client=null;ADM.chantier=null;renderAdmin();
}

document.getElementById('main-nav').style.display='flex';
updateSuiviBadge();
goTab('order');
</script>
</body>
</html>
